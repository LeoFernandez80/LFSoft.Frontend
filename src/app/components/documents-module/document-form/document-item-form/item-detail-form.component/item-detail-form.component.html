<app-generic-form [title]="'Datos del detalle'" [showActions]="true">
  <div data>
    <form [formGroup]="form"  [appFormValidations]="form">
      <div class="document-item-detail-form">
        <div class="document-item-detail-form__group skeleton-field" col-span="1" >
          <label class="document-item-detail-form__label" for="detailId">{{ 'LABEL.id' | translate }}</label>
          <input 
            id="detailId"
            type="number"
            formControlName="detailId"
            class="document-item-detail-form__control"
            readonly/>
        </div>
        <div class="document-item-detail-form__group skeleton-field" col-span="5">
          <label class="document-item-detail-form__label" for="detailDescription">{{ 'LABEL.description' | translate}}</label>
          <input 
          id="detailDescription"
              type="text"
              formControlName="detailDescription"
              class="document-item-detail-form__control "
              >
        </div>          
      </div>
    </form>
  </div>

<app-generic-actions
    footerContent
    (actionClick)="onAction($event)">
  </app-generic-actions>
  
</app-generic-form>
