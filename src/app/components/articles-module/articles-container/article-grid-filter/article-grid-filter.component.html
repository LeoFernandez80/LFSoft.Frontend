<app-generic-form [title]="'TITLE.filter' | translate">
  <div bodyTop>
    <mat-tab-group>
      <mat-tab>
        <ng-template mat-tab-label>
          <div class="articles-filter-tab">
            <div class="articles-filter-tab__label">
              {{ 'TITLE.articleData' | translate }}
            </div>
          </div>
        </ng-template>
        <form [formGroup]="form">
          <div class="articles-filter">
            <div class="articles-filter__group" col-span="6">
              <label class="articles-filter__label" for="id">{{ 'number' | translate }}</label>
              <input
                id="id"
                type="number"
                name="id"
                formControlName="id"
                class="articles-filter__control">
            </div>
          </div>
        </form>
      </mat-tab>
    </mat-tab-group>
  </div>

  <app-generic-actions
    footerContent
    (actionClick)="onAction($event)">
  </app-generic-actions>
</app-generic-form>
