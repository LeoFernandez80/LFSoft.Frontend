<app-generic-form [title]="'Datos del articulo'" [showActions]="true">
  <div headerContent class="form-actions form-actions--header">
    <button mat-button color="primary" (click)="onCancel()" >Cerrar</button>    
    <button mat-button color="primary" >Max</button>    
    <button mat-button color="primary" >Min</button>    
  </div>
  <div data>
    <form [formGroup]="form" class="form form-container--full">
      <div class="form-group" col-span="1">
        <label for="quantity">quantity</label>
        <input 
          id="quantity"
          type="text"
          formControlName="quantity"
          class="form-control"
          [class.is-invalid]="form.get('quantity')?.invalid && form.get('quantity')?.touched">
       
      </div>

      <div class="form-group" col-span="2">
        <label for="assembly">Cod/Assy</label>
        <input 
          id="assembly"
          type="text"
          formControlName="assembly"
          class="form-control"
          [class.is-invalid]="form.get('assembly')?.invalid && form.get('assembly')?.touched">
        <div class="invalid-feedback" *ngIf="form.get('assembly')?.errors?.['required']">
          Last name is required
        </div>
      </div>
      <div class="form-group" col-span="6">
        <label for="description">Description</label>
        <input 
          id="description"
          type="text"
          formControlName="description"
          class="form-control"
          [class.is-invalid]="form.get('description')?.invalid && form.get('description')?.touched">
        <div class="invalid-feedback" *ngIf="form.get('description')?.errors?.['required']">
          Description is required
        </div>
      </div>

       <div class="form-group" col-span="2">
        <label for="price">Precio</label>
        <input 
          id="price"
          type="text"
          formControlName="price"
          class="form-control"
          [class.is-invalid]="form.get('price')?.invalid && form.get('price')?.touched">
        <div class="invalid-feedback" *ngIf="form.get('price')?.errors?.['required']">
          price is required
        </div>
      </div>
    </form>
  </div>
  <div footerContent class="form-actions form-actions--footer">
    <button matButton="filled" (click)="onAccept()" [disabled]="!isReadyToAccept()">Aceptar</button>
  </div>
  
</app-generic-form>
