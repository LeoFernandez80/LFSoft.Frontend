<app-generic-form [title]="'Datos del item ' + (quoteItem?.id || '')" [showActions]="!showForm">
  <div headerContent class="form-actions form-actions--header">
    <button mat-button color="primary" (click)="onRezise(3)">Max</button>    
    <button mat-button color="primary" (click)="onRezise(2)">Restaurar</button>
    <button mat-button color="primary" (click)="onCancel()">Cerrar</button>    
  </div>


  <div data>
    <form [formGroup]="form" class="form form-container--full">
      <div class="form-group" col-span="1">
        <label for="quantity">quantity</label>
        <input 
          id="quantity"
          type="number"
          formControlName="quantity"
          class="form-control">       
      </div>

      <div class="form-group" col-span="3">
        <label for="description">Description</label>
        <input 
          id="description"
          type="text"
          formControlName="description"
          class="form-control"
          [class.is-invalid]="form.get('description')?.invalid && form.get('description')?.touched">
        <div class="invalid-feedback" *ngIf="form.get('description')?.errors?.['required']">
          Description is required
        </div>
      </div>

       <div class="form-group" col-span="2">
        <label for="price">Precio</label>
        <input 
          id="price"
          type="number"
          formControlName="price"
          class="form-control"
          [class.is-invalid]="form.get('price')?.invalid && form.get('price')?.touched">
        <div class="invalid-feedback" *ngIf="form.get('price')?.errors?.['required']">
          price is required
        </div>
      </div>
    </form>
  </div>
 <div bodyTop [ngClass]="{'layout__main': resize == 3}">
    <div class="quote-Item-form__grid">
    <app-quote-item-articles-grid  (edit)="onEdit($event)"></app-quote-item-articles-grid>
    </div>
  </div> 
  @if(showForm){
  <div  bodyRight>
    <div class="quote-Item-form__main">
      <app-quote-item-article-form [quoteItemArticle]="quoteItemArticleSelected"  (accept)="onAcceptQuoteItemArticle($event)" (cancel)="onCancelQuoteItemArticle()"></app-quote-item-article-form>
    </div>
  </div>
  }
  <div footerContent class="form-actions form-actions--footer">
    <button matButton="filled" (click)="onAccept()" [disabled]="!isReadyToAccept()">Aceptar</button>
  </div>
  
</app-generic-form>
