<app-generic-message></app-generic-message>
<app-generic-layout [title]="'TITLE.persons' | translate" class="persons-container">

    <app-generic-actions 
        headerActions
        (actionClick)="onAction($event)">
    </app-generic-actions>

    <app-person-grid-filter 
    filterContent
    class="persons-container__filter"
        [filter]="filterParameters"
        (apply)="onFilterApplied($event)">
    </app-person-grid-filter>

    <app-person-grid 
    gridContent        
    class="persons-container__grid"
    (edit)="onEdit($event)"
        (delete)="onDeletePerson($event)"
        (open)="onOpenPerson($event)"
        >        
    </app-person-grid>

    <div formContent>
        <mat-tab-group >
            <mat-tab *ngFor="let personId of openedPersonsId; let i = index" >
                <ng-template mat-tab-label >
                    <div class="persons-container__tab" (click)="onClickTab(personId)">
                        <div class="persons-container__tab-label">
                            {{ (getPersonById(personId)?.firstName || 'Persona') + ' ' + (getPersonById(personId)?.lastName || '') }} 
                        </div>
                        <button mat-icon-button class="persons-container__tab-button" (click)="onCloseTab(personId); $event.stopPropagation()">
                            <mat-icon>close</mat-icon>
                        </button>
                    </div>
                </ng-template>
                <app-person-form 
                    formContent
                    [personId]="personId"
                    (save)="onSavePerson($event)" 
                    (cancel)="onCancelPerson()">
                </app-person-form>
            </mat-tab>
        </mat-tab-group>
    </div>
