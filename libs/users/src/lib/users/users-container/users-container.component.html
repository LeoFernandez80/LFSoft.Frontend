<lfsoft-shared-message></lfsoft-shared-message>
<div class="body">
    <!-- <div class="floating-toolbar" [style.border]="'4px solid '+config.color">
        <lfsoft-shared-actions (action)="onAction($event)" ></lfsoft-shared-actions>
    </div> -->

    <lfsoft-shared-layout [title]="'TITLE.users' | translate" class="users-container" >

        <app-user-grid-filter 
        filterContent
        class="users-container__filter"
            [filter]="filterParameters"
            (apply)="onFilterApplied($event)">
        </app-user-grid-filter>

        <app-user-grid 
            gridContent        
            class="users-container__grid"
            (edit)="onEdit($event)"
            (delete)="onDeleteUser($event)"
            (open)="onOpenUser($event)"
            (sortChange)="onSortChange($event)"
            (scrollEndChange)="onLoadNextPage()">
        </app-user-grid>

        <div formContent >
            <mat-tab-group [selectedIndex]="selectedTabIndex" [style.border]="'4px solid '+config.color">
                <mat-tab *ngFor="let userId of openedUsersId; let i = index" >
                    <ng-template mat-tab-label>
                        <div class="users-container__tab" (click)="onClickTab(userId)" >
                            <div class="users-container__tab-label">
                                {{ (getUserById(userId)?.user_username || 'Usuario') + ' (' + (getUserById(userId)?.user_role || '') + ')' }} 
                            </div>
                            <button mat-icon-button class="users-container__tab-button"  (click)="onCloseTab(userId); $event.stopPropagation()">
                                <mat-icon >close</mat-icon>
                            </button>
                        </div>
                    </ng-template>
                    <app-user-form 
                        formContent
                        [user]="selectedUserId"
                        (save)="onSaveUser($event)" 
                        (cancel)="onCancelUser()">
                    </app-user-form>
                </mat-tab>
            </mat-tab-group>
        </div>
    </lfsoft-shared-layout>
</div>
