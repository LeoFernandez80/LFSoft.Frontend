<div class="body">
  <div class="floating-toolbar" [style.border]="'4px solid ' + config.color">
    <lfsoft-shared-actions (action)="onAction($event)"></lfsoft-shared-actions>
  </div>

  <lfsoft-shared-message></lfsoft-shared-message>
  <lfsoft-shared-layout [title]="'TITLE.unidadesMedida' | translate" class="unidades-medida-container">
    <app-unidad-medida-grid-filter
      filterContent
      class="unidades-medida-container__filter"
      [filter]="filterParameters"
      (apply)="onFilterApplied($event)">
    </app-unidad-medida-grid-filter>

    <app-unidad-medida-grid
      gridContent
      class="unidades-medida-container__grid"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (open)="onOpen($event)"
      (sortChange)="onSortChange($event)"
      (scrollEndChange)="onLoadNextPage()">
    </app-unidad-medida-grid>

    <div formContent>
      <mat-tab-group [style.border]="'4px solid ' + config.color">
        <mat-tab *ngFor="let itemId of openedUnidadesMedidaId">
          <ng-template mat-tab-label>
            <div class="unidades-medida-container__tab" (click)="onClickTab(itemId)">
              <div class="unidades-medida-container__tab-label">
                {{ getUnidadMedidaById(itemId)?.unidadMedida_descripcion || 'Unidad de medida' }}
              </div>
              <button mat-icon-button class="unidades-medida-container__tab-button" (click)="onCloseTab(itemId); $event.stopPropagation()">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </ng-template>

          <app-unidad-medida-form
            [unidadMedida]="getUnidadMedidaById(itemId)"
            (save)="onSave($event)"
            (cancel)="onCancel()">
          </app-unidad-medida-form>
        </mat-tab>
      </mat-tab-group>
    </div>
  </lfsoft-shared-layout>
</div>
