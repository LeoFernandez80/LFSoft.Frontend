<div class="mat-elevation-z8"   >
  @if (infiniteScroll) {
    <!-- Modo scroll infinito -->
    <div class="grid">      
      <div class="scroll-container" #scrollContainer (scroll)="onScroll($event)">
        <mat-table [dataSource]="dataSource" matSort role="grid" (matSortChange)="onSortChange($event)" >
          <ng-container *ngFor="let column of columns; let i = index" [matColumnDef]="column.field.toString()" >
            <mat-header-cell *matHeaderCellDef mat-sort-header [disabled]="!column.sortable" [style.text-align]="'left'" [style.width]="column.width" [style.min-width]="column.width"  [style.max-width]="column.width" [style.background-color]="getGridHeaderBackgroundColor" [style.color]="getGridHeaderTextColor"  >
              {{column.header | translate}}
            </mat-header-cell>
            <mat-cell *matCellDef="let element" [style.text-align]="column.align" [style.width]="column.width" [style.min-width]="column.width" [style.max-width]="column.width" [style.background-color]="getGridCellBackgroundColor(i)" [style.color]="getGridCellTextColor(i)" >
              {{getCellValue(element, column)}}
            </mat-cell>
          </ng-container>
          @if (hasActions){
            <ng-container matColumnDef="actions" >
              <mat-header-cell *matHeaderCellDef class="actions-column" [style.text-align]="'center'" [style.background-color]="getGridHeaderBackgroundColor" [style.color]="getGridHeaderTextColor"  >
                <mat-icon  (click)="onConfigurationClick()">settings</mat-icon>
              </mat-header-cell>
              <mat-cell *matCellDef="let element" class="actions-column" [style.text-align]="'center'" [style.width]="'auto'" [style.background-color]="getGridCellActionsBackgroundColor" > 
                <lfsoft-shared-actions  
                    class="actions-container"                         
                    (action)="onAction($event, element)">
                </lfsoft-shared-actions> 
              </mat-cell>
            </ng-container>
          }

          <mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" ></mat-header-row>
          <mat-row *matRowDef="let row; columns: displayedColumns;"
            [class.selected]="selectedElement === row"
            (dblclick)="onEdit(row)"
          ></mat-row>
        </mat-table>
      </div>
      <div class="grid-results" >
        <label class="grid-results__label" >{{ 'LABEL.totalRecords' | translate }}: {{ totalRecords }}</label>
      </div>      
    </div>
  } @else {
    <!-- Modo normal con paginación -->
    <mat-table [dataSource]="dataSource" matSort role="grid" (matSortChange)="onSortChange($event)" [ngStyle]="{'background': getGridCellBackgroundColor}">
      
      <ng-container *ngFor="let column of columns" [matColumnDef]="column.field.toString()" >
        <mat-header-cell *matHeaderCellDef mat-sort-header [disabled]="!column.sortable" [style.text-align]="'left'" [style.width]="column.width" [style.min-width]="column.width"  [style.max-width]="column.width">
          {{column.header | translate}}
        </mat-header-cell>
        <mat-cell *matCellDef="let element" [style.text-align]="column.align" [style.width]="column.width" [style.min-width]="column.width" [style.max-width]="column.width" [ngStyle]="{'background': column.cellBackgroundColor, 'color': column.cellTextColor}">
          {{getCellValue(element, column)}}
        </mat-cell>
      </ng-container>
      @if (hasActions){
        <ng-container matColumnDef="actions" >
          <mat-header-cell *matHeaderCellDef class="actions-column" [style.text-align]="'center'"  >
            <mat-icon  (click)="onConfigurationClick()">settings</mat-icon>
          </mat-header-cell>
          <mat-cell *matCellDef="let element" class="actions-column" [style.text-align]="'center'" [style.width]="'auto'" >
            <lfsoft-shared-actions  
                class="actions-container"                         
                (action)="onAction($event, element)">
            </lfsoft-shared-actions> 
          </mat-cell>
        </ng-container>
      }

      <mat-header-row *matHeaderRowDef="displayedColumns" [ngStyle]="{'background': getGridHeaderBackgroundColor, 'color': getGridHeaderTextColor}"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"
           [class.selected]="selectedElement === row"
           (dblclick)="onEdit(row)"
      ></mat-row>
    </mat-table>
  }
</div>

<lfsoft-shared-grid-configurations-drawer [literalKey]="literalKey"></lfsoft-shared-grid-configurations-drawer>
