<form [formGroup]="personForm">
  <div class="person-data-form">
    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_id')">
        <label class="person-data-form__label" for="person_id">{{ 'LABEL.id' | translate }}</label>
      <label for="person_id" formControlName="person_id" class="person-data-form__control"></label>

    </div>

    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_name')">
      <label class="person-data-form__label" for="person_name">{{ 'LABEL.personName' | translate }}</label>
      <input id="person_name" type="text" formControlName="person_name" class="person-data-form__control">
    </div>

    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_lastname')">
      <label class="person-data-form__label" for="person_lastname">{{ 'LABEL.personLastName' | translate }}</label>
      <input id="person_lastname" type="text" formControlName="person_lastname" class="person-data-form__control">
    </div>

    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_nickname')">
      <label class="person-data-form__label" for="person_nickname">{{ 'LABEL.nickname' | translate }}</label>
      <input id="person_nickname" type="text" formControlName="person_nickname" class="person-data-form__control">
    </div>

    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_fullname')">
      <label class="person-data-form__label" for="person_fullname">{{ 'LABEL.fullName' | translate }}</label>
      <input id="person_fullname" type="text" formControlName="person_fullname" class="person-data-form__control" readonly>
    </div>

    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_active')">
      <label class="person-data-form__label" for="person_active">{{ 'LABEL.active' | translate }}</label>
      <input id="person_active" type="checkbox" formControlName="person_active" class="person-data-form__checkbox">
    </div>

    <div class="person-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('person_maritalStatus')">
      <label class="person-data-form__label" for="person_maritalStatus">{{ 'LABEL.maritalStatus' | translate }}</label>
      <input id="person_maritalStatus" type="text" formControlName="person_maritalStatus" class="person-data-form__control">
    </div>
  </div>
</form>
