<lfsoft-shared-form [title]="'TITLE.filter' | translate">
  <div data>
    <mat-tab-group>
      <mat-tab>
        <ng-template mat-tab-label>
          <div class="person-filter-tab">
            <div class="person-filter-tab__label">
              {{ 'TITLE.persons' | translate }}
            </div>
          </div>
        </ng-template>

        <form [formGroup]="form">
          <div class="persons-filter">
            <div class="persons-filter__group">
              <label class="persons-filter__label" for="person_id">{{ 'LABEL.number' | translate }}</label>
              <input id="person_id" type="number" formControlName="person_id" class="persons-filter__control">
            </div>

            <div class="persons-filter__group">
              <label class="persons-filter__label" for="person_name">{{ 'LABEL.personName' | translate }}</label>
              <input id="person_name" type="text" formControlName="person_name" class="persons-filter__control">
            </div>

            <div class="persons-filter__group">
              <label class="persons-filter__label" for="person_lastname">{{ 'LABEL.personLastName' | translate }}</label>
              <input id="person_lastname" type="text" formControlName="person_lastname" class="persons-filter__control">
            </div>

            <div class="persons-filter__group">
              <label class="persons-filter__label" for="person_nickname">{{ 'LABEL.nickname' | translate }}</label>
              <input id="person_nickname" type="text" formControlName="person_nickname" class="persons-filter__control">
            </div>
          </div>
        </form>
      </mat-tab>
    </mat-tab-group>
  </div>

  <lfsoft-shared-actions footerContent (action)="onAction($event)"></lfsoft-shared-actions>
</lfsoft-shared-form>
