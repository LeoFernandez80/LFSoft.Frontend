<div class="body">
  <div class="floating-toolbar">
    <lfsoft-shared-actions (action)="onAction($event)"></lfsoft-shared-actions>
  </div>

  <lfsoft-shared-message></lfsoft-shared-message>
  <lfsoft-shared-layout [title]="'TITLE.persons' | translate" class="persons-container">

      <lfsoft-utilities-person-grid-filter 
      filterContent
      class="persons-container__filter"
          [filter]="filterParameters"
          (apply)="onFilterApplied($event)">
      </lfsoft-utilities-person-grid-filter>

      <lfsoft-utilities-person-grid 
      gridContent        
      class="persons-container__grid"
      (edit)="onEdit($event)"
          (delete)="onDeletePerson($event)"
          (open)="onOpenPerson($event)"
          >        
      </lfsoft-utilities-person-grid>

      <div formContent>
          <mat-tab-group >
              <mat-tab *ngFor="let personId of openedPersonsId; let i = index" >
                  <ng-template mat-tab-label >
                      <div class="persons-container__tab" (click)="onClickTab(personId)">
                          <div class="persons-container__tab-label">
                              {{ getPersonById(personId)?.firstName }} {{ getPersonById(personId)?.lastName }}
                          </div>
                          <button class="persons-container__tab-button" (click)="onCloseTab(personId)">
                              <mat-icon>close</mat-icon>
                          </button>
                      </div>
                  </ng-template>
                  <lfsoft-utilities-person-form 
                      [personId]="personId"
                      (save)="onSavePerson($event)"
                      (cancel)="onCancelPerson()">
                  </lfsoft-utilities-person-form>
              </mat-tab>
          </mat-tab-group>
      </div>

  </lfsoft-shared-layout>
</div>
