<form [formGroup]="entityForm">
  <div class="entity-data-form">
    <div class="entity-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('entity_id')">
        <label class="entity-data-form__label" for="entity_id">{{ 'LABEL.id' | translate }}</label>
      <label for="entity_id" formControlName="entity_id" class="entity-data-form__control"></label>

    </div>

    <div class="entity-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('entity_description')">
      <label class="entity-data-form__label" for="entity_description">{{ 'LABEL.description' | translate }}</label>
      <input id="entity_description" type="text" formControlName="entity_description" class="entity-data-form__control">
    </div>

    <div class="entity-data-form__group skeleton-field" col-span="2" *ngIf="!isHiddenField('entity_active')">
      <label class="entity-data-form__label" for="entity_active">{{ 'LABEL.active' | translate }}</label>
      <input id="entity_active" type="checkbox" formControlName="entity_active" class="entity-data-form__checkbox">
    </div>
  </div>
</form>
