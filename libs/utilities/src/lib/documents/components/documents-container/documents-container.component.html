<lfsoft-shared-message></lfsoft-shared-message>
    <div class="floating-toolbar">
      <lfsoft-shared-actions (action)="onAction($event)"></lfsoft-shared-actions>
    </div>

<lfsoft-shared-layout [title]="'TITLE.documents' | translate" class="documents-container">

    <lfsoft-shared-actions 
        headerActions
        (action)="onAction($event)">
    </lfsoft-shared-actions>

    <app-document-grid-filter 
        filterContent
        class="documents-container__filter"
        [filter]="filterParameters"
        (apply)="onFilterApplied($event)">
    </app-document-grid-filter>

    <app-document-grid 
        gridContent        
        class="documents-container__grid"
        (edit)="onEdit($event)"
        (delete)="onDeleteDocument($event)"
        (open)="onOpenDocument($event)"
        (sortChange)="onSortChange($event)"
        (scrollEndChange)="onLoadNextPage()">        
    </app-document-grid>

    <div formContent>
        <mat-tab-group >
            <mat-tab *ngFor="let documentId of openedDocumentsId; let i = index" >
                <ng-template mat-tab-label >
                    <div class="documents-container__tab" (click)="onClickTab(documentId)">
                        <div class="documents-container__tab-label">
                            {{ (getDocumentById(documentId)?.personName || 'Documento') + ' - ' + (getDocumentById(documentId)?.documentDescription || '') }} 
                        </div>
                        <!-- <button mat-icon-button class="documents-container__tab-button" (click)="onCloseTab(documentId); $event.stopPropagation()">
                            <mat-icon>close</mat-icon>
                        </button> -->
                    </div>
                </ng-template>
                <app-document-form 
                    formContent
                    [documentId]="documentId"
                    (save)="onSaveDocument($event)" 
                    (cancel)="onCancelDocument()">
                </app-document-form>
            </mat-tab>
        </mat-tab-group>
    </div>
    

</lfsoft-shared-layout>
